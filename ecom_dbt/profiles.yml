ecom_dbt:
  outputs:
    dev:
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', default='ecom_michael') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE') }}"
      schema: "{{ env_var('SNOWFLAKE_SCHEMA1', default='DEV') }}"
      threads: "{{ env_var('DBT_NUM_THREADS', default=10) }}"
      type: "{{ env_var('DBT_TYPE', default='snowflake') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', default='COMPUTE_WH') }}"
  target: "{{ env_var('DBT_TARGET', default='dev_michael') }}"