version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_city
        tests:
          - not_null

  - name: dim_seller
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null
      - name: seller_city
        tests:
          - not_null

  - name: dim_product_category_name_translation
    columns:
      - name: product_category_name
        tests:
          - unique
          - not_null